# ============================================================
# ME2 Quiz App - Cloudflare Pages 専用 wrangler.toml
# ============================================================
# このファイルは Cloudflare Pages 用です。
# Workers Static Assets 用の [assets] は Pages では使いません。
# Pages では functions/api/*.js が自動的に /api/* として動きます。
# ============================================================

name = "ce-quiz-app"
compatibility_date = "2026-05-31"
pages_build_output_dir = "."

[vars]
GITHUB_OWNER = "solitary-coffee"
GITHUB_REPO = "ce-quiz-app"
GITHUB_BRANCH = "main"
GITHUB_ROOT = ""

# KVをwrangler.tomlで管理する場合だけ、idを入れてコメント解除してください。
# Dashboardの Pages > Settings > Bindings で設定する場合は、このままでOKです。
# 既存の ME2 用KVと分けるため、Binding name は CE_PROGRESS を使用します。
[[kv_namespaces]]
binding = "CE_PROGRESS"
id = "95ac8924673a45a8b7de2db7e3abfc86"


# ------------------------------------------------------------
# GitHub PR作成機能
# ------------------------------------------------------------
# GITHUB_TOKEN は絶対にwrangler.tomlへ直書きしないでください。
# Cloudflare Pages > Settings > Variables and Secrets で Secret として追加します。
#
# 必須:
#   GITHUB_TOKEN = GitHub fine-grained personal access token（Secret）
#   GITHUB_OWNER = リポジトリ所有者
#   GITHUB_REPO = リポジトリ名
#   GITHUB_BRANCH = PRのbaseブランチ
#
# 任意:
#   GITHUB_ROOT = リポジトリ内でサイトがサブフォルダにある場合のみ指定
#   GITHUB_COMMITTER_NAME = コミット表示名
#   GITHUB_COMMITTER_EMAIL = コミット表示メール
# ------------------------------------------------------------

